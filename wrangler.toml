# Config Cloudflare Worker — permet le déploiement automatique depuis GitHub.
# Remplacez l'id du KV namespace par le vôtre (Cloudflare → Storage & Databases → KV).
# Les jetons WRITE_TOKEN / READ_TOKEN ne se mettent PAS ici : ce sont des Secrets
# à définir dans le tableau de bord Cloudflare (Settings → Variables and Secrets).

name = "vitalis-sync"
main = "vitalis-worker.js"
compatibility_date = "2026-01-01"

[[kv_namespaces]]
binding = "HEALTH"
id = "REMPLACER_PAR_VOTRE_KV_NAMESPACE_ID"

# Cron toutes les 15 min : digest du matin (~05h30 UTC = 7h30 Paris l'été) + rappels
# de compléments envoyés à l'heure locale choisie pour chaque complément.
# Si le Worker est collé manuellement dans le dashboard, ajoutez ce déclencheur
# dans Settings → Triggers → Cron Triggers (valeur : */15 * * * *).
[triggers]
crons = ["*/15 * * * *"]
